<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자비스 칸반 — 회사 · 집 · 취미</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
  :root {
    --bg: #0e0f13;
    --bg-elev: #15171c;
    --bg-card: #1c1f26;
    --border: #2a2e37;
    --border-strong: #3a3f4a;
    --text: #e8eaed;
    --text-dim: #9aa0a6;
    --text-muted: #5f6368;
    --accent-work: #4285f4;     /* 회사 */
    --accent-home: #34a853;     /* 집 */
    --accent-hobby: #fbbc04;    /* 취미 */
    --accent-inbox: #ea4335;    /* 미분류 */
    --shadow: 0 4px 12px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", "Noto Sans KR", sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  h1 {
    font-size: 22px;
    margin: 0;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  .controls {
    display: flex;
    gap: 8px;
  }
  button {
    background: var(--bg-elev);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: background 0.15s;
  }
  button:hover { background: var(--bg-card); }
  button.primary {
    background: var(--accent-work);
    border-color: var(--accent-work);
  }
  button.primary:hover { background: #5b95f5; }

  .board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    align-items: start;
  }
  @media (max-width: 1200px) {
    .board { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 700px) {
    .board { grid-template-columns: 1fr; }
  }
  .column {
    background: var(--bg-elev);
    border-radius: 12px;
    padding: 16px;
    min-height: 400px;
    border: 1px solid var(--border);
  }
  .column-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 2px solid;
  }
  .column[data-cat="inbox"]  .column-header { border-color: var(--accent-inbox); }
  .column[data-cat="work"]   .column-header { border-color: var(--accent-work); }
  .column[data-cat="home"]   .column-header { border-color: var(--accent-home); }
  .column[data-cat="hobby"]  .column-header { border-color: var(--accent-hobby); }

  .column-title {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .count {
    background: var(--bg-card);
    color: var(--text-dim);
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 500;
  }
  .task-list {
    min-height: 200px;
    padding: 4px;
  }
  .task {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    cursor: grab;
    transition: transform 0.1s, box-shadow 0.1s;
    word-break: keep-all;
  }
  .task:hover {
    border-color: var(--border-strong);
    transform: translateY(-1px);
    box-shadow: var(--shadow);
  }
  .task:active { cursor: grabbing; }
  .task.sortable-ghost {
    opacity: 0.4;
    background: var(--accent-work);
  }
  .task.sortable-chosen {
    box-shadow: var(--shadow);
  }
  .task-title {
    font-weight: 500;
    line-height: 1.45;
    margin-bottom: 6px;
  }
  .task-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }
  .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .badge.short  { background: rgba(234,67,53,0.15); color: #ff8a80; border-color: rgba(234,67,53,0.3); }
  .badge.mid    { background: rgba(251,188,4,0.15);  color: #ffd54f; border-color: rgba(251,188,4,0.3); }
  .badge.long   { background: rgba(52,168,83,0.15);  color: #81c995; border-color: rgba(52,168,83,0.3); }
  .badge.proj   { background: rgba(66,133,244,0.15); color: #8ab4f8; border-color: rgba(66,133,244,0.3); }

  .empty {
    color: var(--text-muted);
    text-align: center;
    padding: 40px 0;
    font-size: 13px;
  }

  .add-task {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border-strong);
    color: var(--text-muted);
    padding: 10px;
    border-radius: 6px;
    margin-top: 8px;
    cursor: pointer;
    font-size: 12px;
  }
  .add-task:hover { color: var(--text); border-color: var(--border-strong); }

  .footer {
    margin-top: 32px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
  }
  .save-status {
    display: inline-block;
    margin-left: 8px;
    color: var(--accent-home);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .save-status.show { opacity: 1; }
</style>
</head>
<body>
  <header>
    <h1>🧠 자비스 칸반 — 컨텍스트별 할 일</h1>
    <div class="controls">
      <button onclick="exportJSON()">📦 내보내기</button>
      <button onclick="importJSON()">📥 불러오기</button>
      <button onclick="resetDefault()">🔄 기본값</button>
      <button class="primary" onclick="saveAll()">💾 저장 <span class="save-status" id="status">✓ 저장됨</span></button>
    </div>
  </header>

  <div class="board" id="board">
    <div class="column" data-cat="inbox">
      <div class="column-header">
        <div class="column-title">📥 미분류 <span class="count" id="count-inbox">0</span></div>
      </div>
      <div class="task-list" id="list-inbox"></div>
      <button class="add-task" onclick="addTask('inbox')">+ 할 일 추가</button>
    </div>
    <div class="column" data-cat="work">
      <div class="column-header">
        <div class="column-title">🏢 회사 <span class="count" id="count-work">0</span></div>
      </div>
      <div class="task-list" id="list-work"></div>
      <button class="add-task" onclick="addTask('work')">+ 할 일 추가</button>
    </div>
    <div class="column" data-cat="home">
      <div class="column-header">
        <div class="column-title">🏠 집 <span class="count" id="count-home">0</span></div>
      </div>
      <div class="task-list" id="list-home"></div>
      <button class="add-task" onclick="addTask('home')">+ 할 일 추가</button>
    </div>
    <div class="column" data-cat="hobby">
      <div class="column-header">
        <div class="column-title">🎨 취미 <span class="count" id="count-hobby">0</span></div>
      </div>
      <div class="task-list" id="list-hobby"></div>
      <button class="add-task" onclick="addTask('hobby')">+ 할 일 추가</button>
    </div>
  </div>

  <div class="footer">
    드래그해서 카테고리 이동 · 자동 저장 (브라우저 localStorage) · 📦 내보내기로 JSON 백업
  </div>

<script>
const STORAGE_KEY = 'jarvis-kanban-v1';

const DEFAULT_TASKS = [
  // 회사 (Samsung UX, AXD)
  { id: 't1',  title: 'AI PPT 템플릿 제작',                 cat: 'work',  horizon: 'short', proj: 'AXD' },
  { id: 't2',  title: 'AI 교육 커리큘럼 8주차 완성',          cat: 'work',  horizon: 'mid',   proj: 'AXD' },
  { id: 't3',  title: 'Bixby Routines 사례 패턴화',          cat: 'work',  horizon: 'mid',   proj: 'AXD' },
  { id: 't4',  title: '펌프센터 기획 초안',                   cat: 'work',  horizon: 'mid',   proj: '펌프센터' },
  { id: 't5',  title: 'Gen Customization (One UI 스타일)',  cat: 'work',  horizon: 'long',  proj: 'OneUI' },
  { id: 't6',  title: 'Style generator 검토',                cat: 'work',  horizon: 'long',  proj: 'OneUI' },
  { id: 't7',  title: 'Bixby Routines 패턴화 자동화',        cat: 'work',  horizon: 'long',  proj: 'AXD' },

  // 집 (가족, 서준이)
  { id: 't10', title: '서준이 과제 진행 검토',                 cat: 'home',  horizon: 'short', proj: '서준이공모전' },
  { id: 't11', title: '서준이 데이터 수집 (5개 데이터셋)',     cat: 'home',  horizon: 'mid',   proj: '서준이공모전' },

  // 취미 (개인 IP, 자비스, 사이드 프로젝트)
  { id: 't20', title: 'The Universe 오케스트레이터 설계',     cat: 'hobby', horizon: 'short', proj: 'Universe' },
  { id: 't21', title: 'llm-wiki 소스 ingest 파이프라인 검증', cat: 'hobby', horizon: 'short', proj: 'Jarvis' },
  { id: 't22', title: 'The Universe 수익 포인트 정리',        cat: 'hobby', horizon: 'mid',   proj: 'Universe' },
  { id: 't23', title: 'The Universe 슬라이드 업데이트',       cat: 'hobby', horizon: 'mid',   proj: 'Universe' },
  { id: 't24', title: 'Resonance POC 8주 계획',              cat: 'hobby', horizon: 'long',  proj: 'Resonance' },
  { id: 't25', title: '바이브 게임즈',                        cat: 'hobby', horizon: 'long',  proj: '게임' },
  { id: 't26', title: 'AI 개발팀 (에이전트 설계자 조직)',     cat: 'hobby', horizon: 'long',  proj: 'AI팀' },
  { id: 't27', title: 'Korean Law MCP 에이전트 구축',         cat: 'hobby', horizon: 'long',  proj: 'Jarvis' },
];

let tasks = loadTasks();

function loadTasks() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    try { return JSON.parse(stored); } catch(e) {}
  }
  return JSON.parse(JSON.stringify(DEFAULT_TASKS));
}

function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  showSaved();
}

function showSaved() {
  const el = document.getElementById('status');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1200);
}

function horizonBadge(h) {
  if (h === 'short') return '<span class="badge short">단기</span>';
  if (h === 'mid')   return '<span class="badge mid">중기</span>';
  if (h === 'long')  return '<span class="badge long">장기</span>';
  return '';
}

function projBadge(p) {
  if (!p) return '';
  return `<span class="badge proj">${p}</span>`;
}

function render() {
  const cats = ['inbox', 'work', 'home', 'hobby'];
  cats.forEach(cat => {
    const list = document.getElementById('list-' + cat);
    const items = tasks.filter(t => t.cat === cat);
    document.getElementById('count-' + cat).textContent = items.length;
    if (items.length === 0) {
      list.innerHTML = '<div class="empty">비어있음</div>';
    } else {
      list.innerHTML = items.map(t => `
        <div class="task" data-id="${t.id}">
          <div class="task-title">${escapeHtml(t.title)}</div>
          <div class="task-meta">${horizonBadge(t.horizon)}${projBadge(t.proj)}</div>
        </div>
      `).join('');
    }
  });
  initSortable();
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function initSortable() {
  const cats = ['inbox', 'work', 'home', 'hobby'];
  cats.forEach(cat => {
    const el = document.getElementById('list-' + cat);
    new Sortable(el, {
      group: 'kanban',
      animation: 150,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      onEnd: evt => {
        const id = evt.item.dataset.id;
        const newCat = evt.to.id.replace('list-', '');
        const task = tasks.find(t => t.id === id);
        if (task && task.cat !== newCat) {
          task.cat = newCat;
        }
        // reorder within column
        const newOrder = Array.from(evt.to.children)
          .filter(c => c.classList.contains('task'))
          .map(c => c.dataset.id);
        const others = tasks.filter(t => t.cat !== newCat);
        const inCat = newOrder.map(id => tasks.find(t => t.id === id)).filter(Boolean);
        tasks = [...others, ...inCat];
        saveTasks();
        // re-render counts only
        render();
      }
    });
  });
}

function addTask(cat) {
  const title = prompt('새 할 일 제목:');
  if (!title || !title.trim()) return;
  const id = 't' + Date.now();
  tasks.push({ id, title: title.trim(), cat, horizon: 'short', proj: '' });
  saveTasks();
  render();
}

function saveAll() {
  saveTasks();
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const date = new Date().toISOString().slice(0,10);
  a.download = `jarvis-kanban-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data)) {
          tasks = data;
          saveTasks();
          render();
        }
      } catch (err) { alert('JSON 파싱 실패'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetDefault() {
  if (!confirm('기본값으로 초기화하시겠습니까? 현재 변경사항은 사라집니다.')) return;
  tasks = JSON.parse(JSON.stringify(DEFAULT_TASKS));
  saveTasks();
  render();
}

render();
</script>
</body>
</html>
