<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0c10">
<title>자비스 칸반 · 회사 · 집 · 취미</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
  /* ===========================
     Design Tokens
     =========================== */
  :root {
    /* Semantic color (category) */
    --color-inbox: #e84c5c;
    --color-work:  #4f7cff;
    --color-pump:  #00b8d4;
    --color-home:  #2fb866;
    --color-hobby: #f5a623;

    /* Phase (lifecycle) */
    --phase-ideation:   #a855f7;
    --phase-planning:   #f97316;
    --phase-execution:  #84cc16;
    --phase-validation: #ec4899;
    --phase-wrap:       #14b8a6;

    /* State */
    --state-todo:      #9aa0a6;
    --state-doing:     #8ab4f8;
    --state-done:      #34a853;
    --state-cancelled: #6b7280;

    /* Horizon */
    --h-short: #ff8a80;
    --h-mid:   #ffd166;
    --h-long:  #81c995;

    /* Surfaces (dark default) */
    --surface-0: #0b0c10;
    --surface-1: #12141a;
    --surface-2: #181b23;
    --surface-3: #1f232d;
    --surface-4: #272c38;
    --border:    #262a34;
    --border-hi: #363c49;

    /* Text */
    --text-hi:  #f1f3f5;
    --text-med: #b8bdc7;
    --text-lo:  #6b7280;

    /* Typography scale */
    --text-xs: 11px;
    --text-sm: 12px;
    --text-base: 14px;
    --text-md: 16px;
    --text-lg: 18px;
    --text-xl: 22px;
    --text-2xl: 28px;

    --font-display: 700;
    --font-strong: 600;
    --font-body: 500;
    --font-soft: 400;

    /* Spacing scale */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-7: 32px;
    --space-8: 40px;

    /* Radii */
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 18px;
    --radius-pill: 999px;

    /* Elevation */
    --shadow-1: 0 1px 2px rgba(0,0,0,.35);
    --shadow-2: 0 6px 18px rgba(0,0,0,.45);
    --shadow-3: 0 14px 36px rgba(0,0,0,.55);

    /* Motion */
    --ease: cubic-bezier(.2,.7,.2,1);
    --dur-1: 120ms;
    --dur-2: 220ms;

    /* Layout */
    --touch: 44px;
    --safe-top: env(safe-area-inset-top, 0);
    --safe-bottom: env(safe-area-inset-bottom, 0);
  }

  @media (prefers-color-scheme: light) {
    :root {
      --surface-0: #f6f7f9;
      --surface-1: #ffffff;
      --surface-2: #f1f3f7;
      --surface-3: #e8ebf2;
      --surface-4: #dde1ea;
      --border:    #e3e6ee;
      --border-hi: #ccd2de;
      --text-hi:  #0e1116;
      --text-med: #434a55;
      --text-lo:  #7a828f;
      --shadow-1: 0 1px 2px rgba(20,25,40,.06);
      --shadow-2: 0 6px 18px rgba(20,25,40,.08);
      --shadow-3: 0 14px 36px rgba(20,25,40,.12);
    }
  }

  /* ===========================
     Reset & base
     =========================== */
  *, *::before, *::after {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  html, body { margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }

  /* iOS touch response: eliminate 300ms delay + prevent accidental double-tap zoom */
  button, a, .task, .sheet-backdrop, .sheet-close, .sheet-grip,
  .seg-opt, .seg-btn, .view-btn, .status-btn, .drag-handle,
  .add-task, .chip {
    touch-action: manipulation;
  }
  body {
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(79,124,255,.10), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(47,184,102,.08), transparent 60%),
      var(--surface-0);
    color: var(--text-hi);
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI",
                 "Noto Sans KR", "Apple SD Gothic Neo", system-ui, sans-serif;
    font-size: var(--text-base);
    font-weight: var(--font-body);
    line-height: 1.5;
    word-break: keep-all;
    overflow-wrap: anywhere;
    min-height: 100vh;
    min-height: 100dvh;
    font-feature-settings: "ss01", "tnum";
  }
  button { font-family: inherit; color: inherit; }
  :focus-visible {
    outline: 2px solid var(--color-work);
    outline-offset: 2px;
    border-radius: var(--radius-sm);
  }

  /* ===========================
     App shell
     =========================== */
  .app {
    max-width: 1440px;
    margin: 0 auto;
    padding: calc(var(--space-4) + var(--safe-top)) var(--space-4) calc(var(--space-8) + var(--safe-bottom));
  }

  .appbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
    margin-bottom: var(--space-4);
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: var(--space-2);
    min-width: 0;
  }
  .brand-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px; height: 28px;
    border-radius: var(--radius-md);
    background: linear-gradient(135deg, var(--color-work), var(--color-home));
    color: #fff;
    font-weight: var(--font-display);
    font-size: var(--text-sm);
    box-shadow: var(--shadow-1);
    flex-shrink: 0;
    transform: translateY(2px);
  }
  .brand-title {
    font-size: var(--text-lg);
    font-weight: var(--font-display);
    letter-spacing: -0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .brand-sub {
    font-size: var(--text-xs);
    color: var(--text-lo);
    font-weight: var(--font-body);
    letter-spacing: 0.2px;
  }

  .appbar-actions { display: flex; gap: var(--space-2); }

  /* icon button */
  .iconbtn {
    width: var(--touch);
    height: var(--touch);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text-med);
    cursor: pointer;
    transition: background var(--dur-1) var(--ease),
                transform var(--dur-1) var(--ease),
                color var(--dur-1) var(--ease);
    font-size: var(--text-md);
  }
  .iconbtn:hover { background: var(--surface-2); color: var(--text-hi); }
  .iconbtn:active { transform: scale(.96); }
  .iconbtn.primary {
    background: linear-gradient(135deg, var(--color-work), #6a8dff);
    border-color: transparent;
    color: #fff;
    box-shadow: var(--shadow-1);
  }

  /* ===========================
     Stats strip
     =========================== */
  .stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-2);
    margin-bottom: var(--space-4);
  }
  .stat {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: var(--space-3);
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-height: 64px;
    position: relative;
    overflow: hidden;
  }
  .stat::before {
    content: "";
    position: absolute;
    inset: 0 auto 0 0;
    width: 3px;
    background: var(--accent, var(--color-work));
    border-radius: var(--radius-pill) 0 0 var(--radius-pill);
  }
  .stat-label {
    font-size: var(--text-xs);
    color: var(--text-lo);
    font-weight: var(--font-strong);
    letter-spacing: .4px;
    text-transform: uppercase;
  }
  .stat-value {
    font-size: var(--text-xl);
    font-weight: var(--font-display);
    letter-spacing: -0.5px;
    font-variant-numeric: tabular-nums;
    color: var(--text-hi);
  }
  .stat[data-k="doing"]      { --accent: var(--state-doing); }
  .stat[data-k="todo"]       { --accent: var(--color-inbox); }
  .stat[data-k="done"]       { --accent: var(--state-done); }
  .stat[data-k="cancelled"]  { --accent: var(--state-cancelled); }

  /* ===========================
     Segmented filter (category tabs)
     =========================== */
  .segmented {
    display: flex;
    gap: var(--space-1);
    padding: var(--space-1);
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    margin-bottom: var(--space-4);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .segmented::-webkit-scrollbar { display: none; }
  .seg-btn {
    flex: 1 0 auto;
    min-height: 36px;
    padding: 0 var(--space-4);
    border: none;
    background: transparent;
    color: var(--text-med);
    font-size: var(--text-sm);
    font-weight: var(--font-strong);
    border-radius: var(--radius-pill);
    cursor: pointer;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background var(--dur-1) var(--ease), color var(--dur-1) var(--ease);
  }
  .seg-btn .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--d, var(--text-lo));
  }
  .seg-btn[data-val="all"]    { --d: linear-gradient(135deg, var(--color-work), var(--color-home)); }
  .seg-btn[data-val="inbox"]  { --d: var(--color-inbox); }
  .seg-btn[data-val="work"]   { --d: var(--color-work); }
  .seg-btn[data-val="pump"]   { --d: var(--color-pump); }
  .seg-btn[data-val="home"]   { --d: var(--color-home); }
  .seg-btn[data-val="hobby"]  { --d: var(--color-hobby); }
  .seg-btn.active {
    background: var(--surface-3);
    color: var(--text-hi);
  }

  /* toolbar secondary (hide done / actions / help) */
  .toolbar {
    display: flex;
    gap: var(--space-2);
    margin-bottom: var(--space-4);
    flex-wrap: wrap;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 36px;
    padding: 0 var(--space-3);
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    color: var(--text-med);
    font-size: var(--text-xs);
    font-weight: var(--font-strong);
    cursor: pointer;
    letter-spacing: .2px;
    transition: background var(--dur-1) var(--ease), color var(--dur-1) var(--ease);
  }
  .chip:hover { background: var(--surface-2); }
  .chip.on {
    background: color-mix(in srgb, var(--color-work) 18%, transparent);
    border-color: color-mix(in srgb, var(--color-work) 50%, transparent);
    color: var(--text-hi);
  }

  /* ===========================
     Board
     =========================== */
  .board {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-4);
  }
  .column {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: var(--space-3);
    box-shadow: var(--shadow-1);
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .column[data-cat="inbox"] { --col: var(--color-inbox); }
  .column[data-cat="work"]  { --col: var(--color-work); }
  .column[data-cat="pump"]  { --col: var(--color-pump); }
  .column[data-cat="home"]  { --col: var(--color-home); }
  .column[data-cat="hobby"] { --col: var(--color-hobby); }
  .column[data-phase="ideation"]   { --col: var(--phase-ideation); }
  .column[data-phase="planning"]   { --col: var(--phase-planning); }
  .column[data-phase="execution"]  { --col: var(--phase-execution); }
  .column[data-phase="validation"] { --col: var(--phase-validation); }
  .column[data-phase="wrap"]       { --col: var(--phase-wrap); }

  /* View mode toggle */
  .view-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    padding: 4px;
    margin-bottom: var(--space-3);
  }
  .view-btn {
    background: transparent;
    border: none;
    color: var(--text-med);
    padding: 10px 12px;
    font-size: var(--text-sm);
    font-weight: var(--font-strong);
    font-family: inherit;
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: background var(--dur-1) var(--ease), color var(--dur-1) var(--ease);
    min-height: 40px;
  }
  .view-btn.active {
    background: linear-gradient(135deg, var(--color-work), var(--phase-ideation));
    color: #fff;
    box-shadow: var(--shadow-1);
  }

  /* Phase badge on cards */
  .badge.phase-ideation   { background: color-mix(in srgb, var(--phase-ideation) 18%, transparent);   color: var(--phase-ideation);   border: 1px solid color-mix(in srgb, var(--phase-ideation) 40%, transparent); }
  .badge.phase-planning   { background: color-mix(in srgb, var(--phase-planning) 18%, transparent);   color: var(--phase-planning);   border: 1px solid color-mix(in srgb, var(--phase-planning) 40%, transparent); }
  .badge.phase-execution  { background: color-mix(in srgb, var(--phase-execution) 18%, transparent);  color: var(--phase-execution);  border: 1px solid color-mix(in srgb, var(--phase-execution) 40%, transparent); }
  .badge.phase-validation { background: color-mix(in srgb, var(--phase-validation) 18%, transparent); color: var(--phase-validation); border: 1px solid color-mix(in srgb, var(--phase-validation) 40%, transparent); }
  .badge.phase-wrap       { background: color-mix(in srgb, var(--phase-wrap) 18%, transparent);       color: var(--phase-wrap);       border: 1px solid color-mix(in srgb, var(--phase-wrap) 40%, transparent); }

  .badge.cat-work  { background: color-mix(in srgb, var(--color-work) 15%, transparent);  color: var(--color-work);  border: 1px solid color-mix(in srgb, var(--color-work) 35%, transparent); }
  .badge.cat-pump  { background: color-mix(in srgb, var(--color-pump) 15%, transparent);  color: var(--color-pump);  border: 1px solid color-mix(in srgb, var(--color-pump) 35%, transparent); }
  .badge.cat-home  { background: color-mix(in srgb, var(--color-home) 15%, transparent);  color: var(--color-home);  border: 1px solid color-mix(in srgb, var(--color-home) 35%, transparent); }
  .badge.cat-hobby { background: color-mix(in srgb, var(--color-hobby) 15%, transparent); color: var(--color-hobby); border: 1px solid color-mix(in srgb, var(--color-hobby) 35%, transparent); }
  .badge.cat-inbox { background: color-mix(in srgb, var(--color-inbox) 15%, transparent); color: var(--color-inbox); border: 1px solid color-mix(in srgb, var(--color-inbox) 35%, transparent); }

  .seg-opt[data-v="ideation"].active   { --accent: var(--phase-ideation); }
  .seg-opt[data-v="planning"].active   { --accent: var(--phase-planning); }
  .seg-opt[data-v="execution"].active  { --accent: var(--phase-execution); }
  .seg-opt[data-v="validation"].active { --accent: var(--phase-validation); }
  .seg-opt[data-v="wrap"].active       { --accent: var(--phase-wrap); }

  .seg-btn[data-val="ideation"]   { --d: var(--phase-ideation); }
  .seg-btn[data-val="planning"]   { --d: var(--phase-planning); }
  .seg-btn[data-val="execution"]  { --d: var(--phase-execution); }
  .seg-btn[data-val="validation"] { --d: var(--phase-validation); }
  .seg-btn[data-val="wrap"]       { --d: var(--phase-wrap); }

  .col-header {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-1) var(--space-2) var(--space-3);
    border-bottom: 1px solid var(--border);
    margin-bottom: var(--space-3);
    position: sticky;
    top: 0;
    background: var(--surface-1);
    z-index: 1;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }
  .col-mark {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--col);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--col) 18%, transparent);
    flex-shrink: 0;
  }
  .col-title {
    font-size: var(--text-md);
    font-weight: var(--font-display);
    letter-spacing: -0.2px;
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .col-count {
    font-size: var(--text-xs);
    font-weight: var(--font-strong);
    padding: 3px 10px;
    border-radius: var(--radius-pill);
    background: var(--surface-3);
    color: var(--text-med);
    font-variant-numeric: tabular-nums;
  }

  .task-list {
    min-height: 72px;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    padding: 2px;
  }

  /* ===========================
     Task card
     =========================== */
  .task {
    --stripe: var(--state-todo);
    position: relative;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: var(--space-3) var(--space-3) var(--space-3) calc(var(--space-3) + 4px);
    cursor: grab;
    transition: transform var(--dur-1) var(--ease),
                box-shadow var(--dur-1) var(--ease),
                opacity var(--dur-2) var(--ease);
    min-height: 64px;
  }
  .task::before {
    content: "";
    position: absolute;
    top: 10px; bottom: 10px; left: 4px;
    width: 3px;
    border-radius: var(--radius-pill);
    background: var(--stripe);
    transition: background var(--dur-2) var(--ease);
  }
  .task[data-status="doing"] { --stripe: var(--state-doing); }
  .task[data-status="done"]  { --stripe: var(--state-done); opacity: .55; }
  .task[data-status="done"] .task-title { text-decoration: line-through; color: var(--text-med); }
  .task[data-status="cancelled"] { --stripe: var(--state-cancelled); opacity: .38; }
  .task[data-status="cancelled"] .task-title { text-decoration: line-through; color: var(--text-lo); font-style: italic; }

  .task:active { cursor: grabbing; }
  .task.sortable-chosen { box-shadow: var(--shadow-2); transform: scale(1.01); }
  .task.sortable-ghost  {
    opacity: .3;
    background: color-mix(in srgb, var(--col, var(--color-work)) 30%, var(--surface-2));
  }
  body.hide-done .task[data-status="done"],
  body.hide-done .task[data-status="cancelled"] { display: none; }

  .task-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: var(--space-2);
    margin-bottom: var(--space-2);
  }
  .task-title {
    font-size: var(--text-base);
    font-weight: var(--font-strong);
    line-height: 1.45;
    letter-spacing: -0.1px;
    color: var(--text-hi);
    flex: 1;
    min-width: 0;
  }
  .status-btn {
    flex-shrink: 0;
    min-height: 28px;
    padding: 0 10px;
    font-size: 10px;
    font-weight: var(--font-display);
    letter-spacing: .6px;
    text-transform: uppercase;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border-hi);
    background: transparent;
    color: var(--text-med);
    cursor: pointer;
    transition: background var(--dur-1) var(--ease), color var(--dur-1) var(--ease), border-color var(--dur-1) var(--ease);
  }
  .status-btn[data-state="doing"] {
    color: var(--state-doing);
    border-color: color-mix(in srgb, var(--state-doing) 60%, transparent);
    background: color-mix(in srgb, var(--state-doing) 14%, transparent);
  }
  .status-btn[data-state="done"] {
    color: var(--state-done);
    border-color: color-mix(in srgb, var(--state-done) 60%, transparent);
    background: color-mix(in srgb, var(--state-done) 14%, transparent);
  }
  .status-btn[data-state="cancelled"] {
    color: var(--state-cancelled);
    border-color: color-mix(in srgb, var(--state-cancelled) 60%, transparent);
    background: color-mix(in srgb, var(--state-cancelled) 14%, transparent);
    text-decoration: line-through;
  }

  .task-header-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .drag-handle {
    width: 28px;
    height: 28px;
    min-height: 28px;
    padding: 0;
    background: transparent;
    border: none;
    color: var(--text-lo);
    font-size: 14px;
    line-height: 1;
    cursor: grab;
    border-radius: var(--radius-sm);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    letter-spacing: -2px;
  }
  .drag-handle:active { cursor: grabbing; background: var(--surface-3); }
  .drag-handle:hover { color: var(--text-med); background: var(--surface-3); }
  .task { cursor: pointer; }

  /* ===========================
     Edit Sheet (mobile bottom-sheet / desktop modal)
     =========================== */
  .sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 100;
    opacity: 0;
    visibility: hidden;
    transition: opacity var(--dur-2) var(--ease), visibility var(--dur-2);
  }
  .sheet-backdrop.open { opacity: 1; visibility: visible; }

  .sheet {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--surface-2);
    border-top: 1px solid var(--border);

</style>
</head>
<body>

<script>
const STORAGE_KEY = 'jarvis-kanban-v2';

const DEFAULT_TASKS = [
  { id: 't1',  title: 'AI PPT 템플릿 제작',                 cat: 'work',  horizon: 'short', proj: 'AXD',          status: 'todo',  phase: 'planning' },
  { id: 't2',  title: 'AI 교육 커리큘럼 8주차 완성',          cat: 'work',  horizon: 'mid',   proj: 'AXD',          status: 'todo',  phase: 'execution' },
  { id: 't3',  title: 'Bixby Routines 사례 패턴화',          cat: 'work',  horizon: 'mid',   proj: 'AXD',          status: 'todo',  phase: 'execution' },
  { id: 't4',  title: '펌프센터 기획 초안',                   cat: 'pump',  horizon: 'mid',   proj: '펌프센터',      status: 'todo',  phase: 'planning' },
  { id: 't5',  title: 'Gen Customization (One UI 스타일)',  cat: 'work',  horizon: 'long',  proj: 'OneUI',        status: 'todo',  phase: 'ideation' },
  { id: 't6',  title: 'Style generator 검토',                cat: 'work',  horizon: 'long',  proj: 'OneUI',        status: 'todo',  phase: 'ideation' },
  { id: 't7',  title: 'Bixby Routines 패턴화 자동화',        cat: 'work',  horizon: 'long',  proj: 'AXD',          status: 'todo',  phase: 'ideation' },
  { id: 't10', title: '서준이 과제 진행 검토',                 cat: 'home',  horizon: 'short', proj: '서준이공모전', status: 'todo',  phase: 'execution' },
  { id: 't11', title: '서준이 데이터 수집 (5개 데이터셋)',     cat: 'home',  horizon: 'mid',   proj: '서준이공모전', status: 'todo',  phase: 'execution' },
  { id: 't20', title: 'The Universe 오케스트레이터 설계',     cat: 'hobby', horizon: 'short', proj: 'Universe',     status: 'doing', phase: 'planning' },
  { id: 't21', title: 'llm-wiki 소스 ingest 파이프라인 검증', cat: 'hobby', horizon: 'short', proj: 'Jarvis',       status: 'todo',  phase: 'validation' },
  { id: 't22', title: 'The Universe 수익 포인트 정리',        cat: 'hobby', horizon: 'mid',   proj: 'Universe',     status: 'todo',  phase: 'planning' },
  { id: 't23', title: 'The Universe 슬라이드 업데이트',       cat: 'hobby', horizon: 'mid',   proj: 'Universe',     status: 'todo',  phase: 'wrap' },
  { id: 't24', title: 'Resonance POC 8주 계획',              cat: 'hobby', horizon: 'long',  proj: 'Resonance',    status: 'todo',  phase: 'planning' },
  { id: 't25', title: '바이브 게임즈',                        cat: 'hobby', horizon: 'long',  proj: '게임',          status: 'todo',  phase: 'ideation' },
  { id: 't26', title: 'AI 개발팀 (에이전트 설계자 조직)',     cat: 'hobby', horizon: 'long',  proj: 'AI팀',          status: 'todo',  phase: 'ideation' },
  { id: 't27', title: 'Korean Law MCP 에이전트 구축',         cat: 'hobby', horizon: 'long',  proj: 'Jarvis',       status: 'todo',  phase: 'planning' },
];

const STATUS_ORDER = ['todo', 'doing', 'done', 'cancelled'];
const STATUS_LABEL = { todo: 'TODO', doing: 'DOING', done: 'DONE', cancelled: '취소' };
const HORIZON_LABEL = { short: '단기', mid: '중기', long: '장기' };

const AXIS = {
  context: {
    key: 'cat',
    values: ['work', 'pump', 'home', 'hobby', 'inbox'],
    labels: { work: '회사', pump: '펌프센터', home: '집', hobby: '취미', inbox: '미분류' },
    emoji:  { work: '🏢', pump: '💧', home: '🏠', hobby: '🎨', inbox: '📥' }
  },
  phase: {
    key: 'phase',
    values: ['ideation', 'planning', 'execution', 'validation', 'wrap'],
    labels: { ideation: '아이디에이션', planning: '기획', execution: '실행', validation: '검증', wrap: '마무리' },
    emoji:  { ideation: '💭', planning: '📐', execution: '⚙️', validation: '🔍', wrap: '🏁' }
  }
};

let tasks = loadTasks();
let hideDone = localStorage.getItem('kanban-hide-done') === '1';
let showActions = localStorage.getItem('kanban-show-actions') === '1';
let activeCat = localStorage.getItem('kanban-active-cat') || 'all';
let viewMode = localStorage.getItem('kanban-view-mode') || 'context';

function loadTasks() {
  const migrate = arr => arr.map(t => ({
    status: 'todo',
    phase: 'execution',
    ...t
  }));
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    try { return migrate(JSON.parse(stored)); } catch(e) {}
  }
  const v1 = localStorage.getItem('jarvis-kanban-v1');
  if (v1) {
    try {
      const parsed = migrate(JSON.parse(v1));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
      return parsed;
    } catch(e) {}
  }
  return JSON.parse(JSON.stringify(DEFAULT_TASKS));
}

function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  const el = document.getElementById('status');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 900);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function horizonBadge(h) {
  if (!h || !HORIZON_LABEL[h]) return '';
  return `<span class="badge ${h}">${HORIZON_LABEL[h]}</span>`;
}
function projBadge(p) { return p ? `<span class="badge proj">${escapeHtml(p)}</span>` : ''; }
function catBadge(cat) {
  const ax = AXIS.context;
  if (!cat || !ax.labels[cat]) return '';
  return `<span class="badge cat-${cat}">${ax.emoji[cat]} ${ax.labels[cat]}</span>`;
}
function phaseBadge(phase) {
  const ax = AXIS.phase;
  if (!phase || !ax.labels[phase]) return '';
  return `<span class="badge phase-${phase}">${ax.emoji[phase]} ${ax.labels[phase]}</span>`;
}

function updateStats() {
  const ax = AXIS[viewMode];
  const scope = activeCat === 'all'
    ? tasks
    : tasks.filter(t => t[ax.key] === activeCat);
  const doing     = scope.filter(t => t.status === 'doing').length;
  const todo      = scope.filter(t => (t.status || 'todo') === 'todo').length;
  const done      = scope.filter(t => t.status === 'done').length;
  const cancelled = scope.filter(t => t.status === 'cancelled').length;
  document.getElementById('stat-doing').textContent = doing;
  document.getElementById('stat-todo').textContent = todo;
  document.getElementById('stat-done').textContent = done;
  const elCancel = document.getElementById('stat-cancelled');
  if (elCancel) elCancel.textContent = cancelled;
}

function renderSegmentedFilter() {
  const ax = AXIS[viewMode];
  const seg = document.getElementById('segmented');
  const parts = [`<button class="seg-btn" data-val="all"><span class="dot"></span>전체</button>`];
  ax.values.forEach(v => {
    parts.push(`<button class="seg-btn" data-val="${v}"><span class="dot"></span>${ax.emoji[v]} ${ax.labels[v]}</button>`);
  });
  seg.innerHTML = parts.join('');
  seg.querySelectorAll('.seg-btn').forEach(btn => {
    btn.addEventListener('click', () => setActiveCat(btn.dataset.val));
  });
}

function applySegmentedFilter() {
  document.querySelectorAll('#segmented .seg-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === activeCat);
  });
  const board = document.getElementById('board');
  const ax = AXIS[viewMode];
  if (activeCat === 'all') {
    board.classList.remove('filtered');
    document.querySelectorAll('.column').forEach(c => c.classList.remove('match'));
  } else {
    board.classList.add('filtered');
    document.querySelectorAll('.column').forEach(c => {
      const match = c.dataset[ax.key === 'cat' ? 'cat' : 'phase'] === activeCat;
      c.classList.toggle('match', match);
    });
  }
}

function renderBoard() {
  const ax = AXIS[viewMode];
  const board = document.getElementById('board');
  board.innerHTML = ax.values.map(v => `
    <section class="column" data-${ax.key === 'cat' ? 'cat' : 'phase'}="${v}">
      <div class="col-header">
        <span class="col-mark"></span>
        <div class="col-title">${ax.emoji[v]} ${ax.labels[v]}</div>
        <span class="col-count" id="count-${v}">0</span>
      </div>
      <div class="task-list" id="list-${v}"></div>
      <button class="add-task" data-addcat="${v}">+ ${ax.labels[v]} 할 일 추가</button>
    </section>
  `).join('');
  board.querySelectorAll('.add-task').forEach(btn => {
    btn.addEventListener('click', () => addTask(btn.dataset.addcat));
  });
}

function render() {
  document.body.classList.toggle('hide-done', hideDone);
  document.getElementById('filter-done-btn').classList.toggle('on', hideDone);
  document.getElementById('actions-btn').classList.toggle('on', showActions);
  document.querySelectorAll('.view-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === viewMode);
  });

  renderBoard();
  renderSegmentedFilter();

  const ax = AXIS[viewMode];
  ax.values.forEach(v => {
    const list = document.getElementById('list-' + v);
    const items = tasks.filter(t => (t[ax.key] || ax.values[ax.values.length - 1]) === v);
    const visibleCount = hideDone ? items.filter(t => t.status !== 'done' && t.status !== 'cancelled').length : items.length;
    document.getElementById('count-' + v).textContent = visibleCount;
    if (items.length === 0) {
      list.innerHTML = '<div class="empty">비어있음</div>';
    } else {
      list.innerHTML = items.map(t => `
        <div class="task" data-id="${t.id}" data-status="${t.status || 'todo'}">
          <div class="task-header">
            <div class="task-title">${escapeHtml(t.title)}</div>
            <div class="task-header-actions">
              <button class="status-btn" data-action="cycle-status" data-task-id="${t.id}" data-state="${t.status || 'todo'}">${STATUS_LABEL[t.status || 'todo']}</button>
              <button class="drag-handle" data-action="nop" aria-label="드래그">⋮⋮</button>
            </div>
          </div>
          <div class="task-meta">
            ${viewMode === 'context' ? phaseBadge(t.phase) : catBadge(t.cat)}
            ${horizonBadge(t.horizon)}
            ${projBadge(t.proj)}
          </div>
        </div>
      `).join('');
    }
  });
  applySegmentedFilter();
  updateStats();
  initSortable();
}

function initSortable() {
  const ax = AXIS[viewMode];
  ax.values.forEach(v => {
    const el = document.getElementById('list-' + v);
    if (!el) return;
    if (el._sortable) el._sortable.destroy();
    el._sortable = new Sortable(el, {
      group: 'kanban',
      animation: 180,
      handle: '.drag-handle',
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      onEnd: evt => {
        const id = evt.item.dataset.id;
        const newVal = evt.to.id.replace('list-', '');
        const task = tasks.find(t => t.id === id);
        if (task) task[ax.key] = newVal;
        const newOrder = Array.from(evt.to.children)
          .filter(c => c.classList.contains('task'))
          .map(c => c.dataset.id);
        const others = tasks.filter(t => t[ax.key] !== newVal);
        const inCol = newOrder.map(id => tasks.find(t => t.id === id)).filter(Boolean);
        tasks = [...others, ...inCol];
        saveTasks();
        render();
      }
    });
  });
}

function cycleStatus(id) {
  if (editingId) return; // guard: never cycle while editing
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const cur = task.status || 'todo';
  const next = STATUS_ORDER[(STATUS_ORDER.indexOf(cur) + 1) % STATUS_ORDER.length];
  task.status = next;
  saveTasks();
  render();
}

function cycleHorizon(id, evt) {
  if (evt) evt.stopPropagation();
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const ORDER = ['short', 'mid', 'long'];
  const cur = task.horizon || 'short';
  task.horizon = ORDER[(ORDER.indexOf(cur) + 1) % ORDER.length];
  saveTasks();
  render();
}

function editTask(id, evt) {
  if (evt) evt.stopPropagation();
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const newTitle = prompt('제목 수정:', task.title);
  if (newTitle && newTitle.trim()) {
    task.title = newTitle.trim();
    saveTasks();
    render();
  }
}

function deleteTask(id, evt) {
  if (evt) evt.stopPropagation();
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  if (!confirm(`"${task.title}" 삭제하시겠습니까?`)) return;
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  render();
}

function addTask(value) {
  const id = 't' + Date.now();
  const ax = AXIS[viewMode];
  const newTask = {
    id,
    title: '',
    cat:     viewMode === 'context' ? value : 'inbox',
    phase:   viewMode === 'phase'   ? value : 'execution',
    horizon: 'short',
    proj:    '',
    status:  'todo'
  };
  tasks.push(newTask);
  saveTasks();
  render();
  openEdit(id);
}

function setViewMode(mode) {
  if (mode !== 'context' && mode !== 'phase') return;
  viewMode = mode;
  localStorage.setItem('kanban-view-mode', mode);
  activeCat = 'all'; // reset filter across view switch
  localStorage.setItem('kanban-active-cat', 'all');
  render();
}

/* ── Edit Sheet ──────────────────────────────────────────── */
let editingId = null;

function openEdit(id) {
  if (editingId) return; // don't reopen if already open
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  editingId = id;

  document.getElementById('sheet-input-title').value = task.title || '';
  document.getElementById('sheet-input-proj').value  = task.proj  || '';

  setSegActive('sheet-seg-cat',     task.cat || 'inbox');
  setSegActive('sheet-seg-phase',   task.phase || 'execution');
  setSegActive('sheet-seg-status',  task.status || 'todo');
  setSegActive('sheet-seg-horizon', task.horizon || 'short');

  document.getElementById('sheet-backdrop').classList.add('open');
  document.getElementById('sheet').classList.add('open');

  // auto-focus title if empty (newly created)
  if (!task.title) {
    setTimeout(() => document.getElementById('sheet-input-title').focus(), 240);
  }
}

function setSegActive(containerId, value) {
  document.querySelectorAll('#' + containerId + ' .seg-opt').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.v === value);
  });
}

function getSegValue(containerId) {
  const active = document.querySelector('#' + containerId + ' .seg-opt.active');
  return active ? active.dataset.v : null;
}

// seg click handlers (delegate)
document.addEventListener('click', e => {
  const btn = e.target.closest('.seg-opt');
  if (!btn) return;
  const container = btn.parentElement;
  if (!container || !container.classList.contains('seg-field')) return;
  container.querySelectorAll('.seg-opt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
});

// Task / board delegation — single handler, prevents iOS double-fire
document.getElementById('board').addEventListener('click', e => {
  const actionBtn = e.target.closest('[data-action]');
  if (actionBtn) {
    e.stopPropagation();
    e.preventDefault();
    const action = actionBtn.dataset.action;
    const tid = actionBtn.dataset.taskId;
    if (action === 'cycle-status' && tid) cycleStatus(tid);
    return;
  }
  const card = e.target.closest('.task');
  if (card && card.dataset.id) {
    if (editingId) return;
    openEdit(card.dataset.id);
  }
});

// pointerdown guard — iOS 특히 touchstart에서 부모 이벤트 차단
document.getElementById('board').addEventListener('pointerdown', e => {
  const btn = e.target.closest('[data-action]');
  if (btn) e.stopPropagation();
}, true);

function closeEdit() {
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  editingId = null;
}

function saveFromSheet() {
  if (!editingId) return;
  const task = tasks.find(t => t.id === editingId);
  if (!task) return;
  const newTitle = document.getElementById('sheet-input-title').value.trim();
  if (!newTitle) {
    // empty title = delete
    tasks = tasks.filter(t => t.id !== editingId);
  } else {
    task.title   = newTitle;
    task.cat     = getSegValue('sheet-seg-cat')     || task.cat;
    task.phase   = getSegValue('sheet-seg-phase')   || task.phase || 'execution';
    task.status  = getSegValue('sheet-seg-status')  || task.status;
    task.horizon = getSegValue('sheet-seg-horizon') || task.horizon;
    task.proj    = document.getElementById('sheet-input-proj').value.trim();
  }
  saveTasks();
  closeEdit();
  render();
}

function deleteFromSheet() {
  if (!editingId) return;
  const task = tasks.find(t => t.id === editingId);
  if (!task) return;
  if (!confirm(`"${task.title || '(제목 없음)'}" 삭제하시겠습니까?`)) return;
  tasks = tasks.filter(t => t.id !== editingId);
  saveTasks();
  closeEdit();
  render();
}

// ESC to close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && editingId) closeEdit();
});

function toggleHideDone() {
  hideDone = !hideDone;
  localStorage.setItem('kanban-hide-done', hideDone ? '1' : '0');
  render();
}

function cycleExpand() {
  showActions = !showActions;
  localStorage.setItem('kanban-show-actions', showActions ? '1' : '0');
  render();
}

function setActiveCat(cat) {
  activeCat = cat;
  localStorage.setItem('kanban-active-cat', cat);
  applySegmentedFilter();
  updateStats();
}

function showHelp() {
  alert([
    '자비스 칸반 사용법',
    '',
    '[보기 전환]',
    '• 🏢 소속별 — 회사/펌프센터/집/취미/미분류',
    '• 🎯 단계별 — 아이디에이션/기획/실행/검증/마무리',
    '• 상단 토글 버튼으로 전환 · 데이터 동일, 보기 방식만 변경',
    '',
    '• 카드 탭 → 편집 시트 (모든 필드 한 번에 변경)',
    '• 상태 배지 탭 → TODO/DOING/DONE/취소 순환',
    '• ⋮⋮ 드래그 → 컬럼 이동 (현재 축 기준으로 소속/단계 자동 적용)',
    '• 상단 필터 탭 → 집중 모드',
    '• 완료 숨김 → DONE/취소 카드 감춤',
    '• 저장: localStorage 자동 · 📦 내보내기로 JSON 백업',
  ].join('\n'));
}

function saveAll() { saveTasks(); }

function exportJSON() {
  const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const date = new Date().toISOString().slice(0,10);
  a.download = `jarvis-kanban-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data)) {
          tasks = data.map(t => ({ status: 'todo', ...t }));
          saveTasks();
          render();
        }
      } catch (err) { alert('JSON 파싱 실패'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetDefault() {
  if (!confirm('기본값으로 초기화하시겠습니까? 현재 변경사항이 사라집니다.')) return;
  tasks = JSON.parse(JSON.stringify(DEFAULT_TASKS));
  saveTasks();
  render();
}

render();
</script>
</body>
