<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자비스 칸반 — 회사 · 집 · 취미</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
  :root {
    --bg: #0e0f13;
    --bg-elev: #15171c;
    --bg-card: #1c1f26;
    --border: #2a2e37;
    --border-strong: #3a3f4a;
    --text: #e8eaed;
    --text-dim: #9aa0a6;
    --text-muted: #5f6368;
    --accent-work: #4285f4;
    --accent-home: #34a853;
    --accent-hobby: #fbbc04;
    --accent-inbox: #ea4335;
    --accent-doing: #8ab4f8;
    --shadow: 0 4px 12px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    padding: 12px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
    font-size: 14px;
    min-height: 100vh;
    word-break: keep-all;
  }
  header {
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  h1 {
    font-size: 18px;
    margin: 0 0 10px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .controls {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  button {
    background: var(--bg-elev);
    border: 1px solid var(--border-strong);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: background 0.15s;
    min-height: 44px;
  }
  button:active { background: var(--bg-card); }
  button.primary {
    background: var(--accent-work);
    border-color: var(--accent-work);
  }
  button.compact {
    padding: 6px 10px;
    font-size: 12px;
    min-height: 32px;
  }

  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .toolbar button {
    font-size: 12px;
    padding: 8px 12px;
    min-height: 36px;
  }
  .toolbar button.active {
    background: var(--accent-work);
    border-color: var(--accent-work);
  }

  .board {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  .column {
    background: var(--bg-elev);
    border-radius: 12px;
    padding: 14px;
    border: 1px solid var(--border);
  }
  .column-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 2px solid;
  }
  .column[data-cat="inbox"]  .column-header { border-color: var(--accent-inbox); }
  .column[data-cat="work"]   .column-header { border-color: var(--accent-work); }
  .column[data-cat="home"]   .column-header { border-color: var(--accent-home); }
  .column[data-cat="hobby"]  .column-header { border-color: var(--accent-hobby); }

  .column-title {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .count {
    background: var(--bg-card);
    color: var(--text-dim);
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 500;
  }
  .task-list {
    min-height: 60px;
    padding: 4px;
  }
  .task {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
    cursor: grab;
    transition: transform 0.1s, box-shadow 0.1s, opacity 0.15s;
    position: relative;
    min-height: 60px;
  }
  .task:active { cursor: grabbing; }
  .task.sortable-ghost { opacity: 0.4; background: var(--accent-work); }
  .task.sortable-chosen { box-shadow: var(--shadow); }

  .task[data-status="doing"] {
    border-left: 4px solid var(--accent-doing);
    padding-left: 9px;
    box-shadow: 0 0 0 1px rgba(138,180,248,0.3);
  }
  .task[data-status="done"] { opacity: 0.45; }
  .task[data-status="done"] .task-title { text-decoration: line-through; }

  body.hide-done .task[data-status="done"] { display: none; }

  .task-header {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 6px;
  }
  .status-btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--text-dim);
    padding: 2px 10px;
    font-size: 11px;
    min-height: 26px;
    border-radius: 12px;
    flex-shrink: 0;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    font-weight: 600;
  }
  .status-btn[data-state="todo"]  { color: var(--text-dim); border-color: var(--border-strong); }
  .status-btn[data-state="doing"] { color: var(--accent-doing); border-color: var(--accent-doing); background: rgba(138,180,248,0.1); }
  .status-btn[data-state="done"]  { color: var(--accent-home); border-color: var(--accent-home); background: rgba(52,168,83,0.1); }

  .task-title {
    font-weight: 500;
    line-height: 1.45;
    margin-bottom: 6px;
    font-size: 14px;
    padding-right: 4px;
  }
  .task-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }
  .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .badge.short { background: rgba(234,67,53,0.15);  color: #ff8a80; border-color: rgba(234,67,53,0.3); }
  .badge.mid   { background: rgba(251,188,4,0.15);  color: #ffd54f; border-color: rgba(251,188,4,0.3); }
  .badge.long  { background: rgba(52,168,83,0.15);  color: #81c995; border-color: rgba(52,168,83,0.3); }
  .badge.proj  { background: rgba(66,133,244,0.15); color: #8ab4f8; border-color: rgba(66,133,244,0.3); }

  .task-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
  }
  .task-action {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 8px;
    font-size: 11px;
    border-radius: 6px;
    cursor: pointer;
    min-height: 30px;
  }
  .task-action:active { background: var(--bg-elev); }
  .task-action.delete { color: #ff8a80; border-color: rgba(234,67,53,0.3); }

  .empty {
    color: var(--text-muted);
    text-align: center;
    padding: 24px 0;
    font-size: 12px;
  }

  .add-task {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border-strong);
    color: var(--text-muted);
    padding: 12px;
    border-radius: 8px;
    margin-top: 8px;
    cursor: pointer;
    font-size: 12px;
    min-height: 44px;
  }
  .add-task:active { color: var(--text); }

  .footer {
    margin-top: 24px;
    text-align: center;
    color: var(--text-muted);
    font-size: 11px;
    padding: 0 8px;
    line-height: 1.6;
  }
  .save-status {
    display: inline-block;
    margin-left: 6px;
    color: var(--accent-home);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .save-status.show { opacity: 1; }

  /* PC expansion */
  @media (min-width: 768px) {
    body { padding: 24px; font-size: 14px; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    h1 { font-size: 22px; margin: 0; }
    .controls {
      display: flex;
      gap: 8px;
      grid-template-columns: none;
    }
    button { min-height: 40px; }
    .board {
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
  }
  @media (min-width: 1200px) {
    .board { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body>
  <header>
    <h1>🧠 자비스 칸반</h1>
    <div class="controls">
      <button onclick="exportJSON()">📦 내보내기</button>
      <button onclick="importJSON()">📥 불러오기</button>
      <button onclick="resetDefault()">🔄 초기화</button>
      <button class="primary" onclick="saveAll()">💾 저장<span class="save-status" id="status">✓</span></button>
    </div>
  </header>

  <div class="toolbar">
    <button id="filter-done-btn" onclick="toggleHideDone()">✅ 완료 숨김</button>
    <button onclick="cycleExpand()">🔧 액션 버튼</button>
    <button onclick="showHelp()">❓ 도움말</button>
  </div>

  <div class="board" id="board">
    <div class="column" data-cat="inbox">
      <div class="column-header">
        <div class="column-title">📥 미분류 <span class="count" id="count-inbox">0</span></div>
      </div>
      <div class="task-list" id="list-inbox"></div>
      <button class="add-task" onclick="addTask('inbox')">+ 할 일 추가</button>
    </div>
    <div class="column" data-cat="work">
      <div class="column-header">
        <div class="column-title">🏢 회사 <span class="count" id="count-work">0</span></div>
      </div>
      <div class="task-list" id="list-work"></div>
      <button class="add-task" onclick="addTask('work')">+ 할 일 추가</button>
    </div>
    <div class="column" data-cat="home">
      <div class="column-header">
        <div class="column-title">🏠 집 <span class="count" id="count-home">0</span></div>
      </div>
      <div class="task-list" id="list-home"></div>
      <button class="add-task" onclick="addTask('home')">+ 할 일 추가</button>
    </div>
    <div class="column" data-cat="hobby">
      <div class="column-header">
        <div class="column-title">🎨 취미 <span class="count" id="count-hobby">0</span></div>
      </div>
      <div class="task-list" id="list-hobby"></div>
      <button class="add-task" onclick="addTask('hobby')">+ 할 일 추가</button>
    </div>
  </div>

  <div class="footer">
    <strong>💡 사용법</strong><br>
    · 상태 배지(TODO / DOING / DONE) 탭하면 순환<br>
    · 카드 길게 눌러 드래그하면 컬럼 이동<br>
    · 자동 저장 (브라우저 localStorage)
  </div>

<script>
const STORAGE_KEY = 'jarvis-kanban-v2';

const DEFAULT_TASKS = [
  { id: 't1',  title: 'AI PPT 템플릿 제작',                 cat: 'work',  horizon: 'short', proj: 'AXD',          status: 'todo' },
  { id: 't2',  title: 'AI 교육 커리큘럼 8주차 완성',          cat: 'work',  horizon: 'mid',   proj: 'AXD',          status: 'todo' },
  { id: 't3',  title: 'Bixby Routines 사례 패턴화',          cat: 'work',  horizon: 'mid',   proj: 'AXD',          status: 'todo' },
  { id: 't4',  title: '펌프센터 기획 초안',                   cat: 'work',  horizon: 'mid',   proj: '펌프센터',      status: 'todo' },
  { id: 't5',  title: 'Gen Customization (One UI 스타일)',  cat: 'work',  horizon: 'long',  proj: 'OneUI',        status: 'todo' },
  { id: 't6',  title: 'Style generator 검토',                cat: 'work',  horizon: 'long',  proj: 'OneUI',        status: 'todo' },
  { id: 't7',  title: 'Bixby Routines 패턴화 자동화',        cat: 'work',  horizon: 'long',  proj: 'AXD',          status: 'todo' },
  { id: 't10', title: '서준이 과제 진행 검토',                 cat: 'home',  horizon: 'short', proj: '서준이공모전', status: 'todo' },
  { id: 't11', title: '서준이 데이터 수집 (5개 데이터셋)',     cat: 'home',  horizon: 'mid',   proj: '서준이공모전', status: 'todo' },
  { id: 't20', title: 'The Universe 오케스트레이터 설계',     cat: 'hobby', horizon: 'short', proj: 'Universe',     status: 'doing' },
  { id: 't21', title: 'llm-wiki 소스 ingest 파이프라인 검증', cat: 'hobby', horizon: 'short', proj: 'Jarvis',       status: 'todo' },
  { id: 't22', title: 'The Universe 수익 포인트 정리',        cat: 'hobby', horizon: 'mid',   proj: 'Universe',     status: 'todo' },
  { id: 't23', title: 'The Universe 슬라이드 업데이트',       cat: 'hobby', horizon: 'mid',   proj: 'Universe',     status: 'todo' },
  { id: 't24', title: 'Resonance POC 8주 계획',              cat: 'hobby', horizon: 'long',  proj: 'Resonance',    status: 'todo' },
  { id: 't25', title: '바이브 게임즈',                        cat: 'hobby', horizon: 'long',  proj: '게임',          status: 'todo' },
  { id: 't26', title: 'AI 개발팀 (에이전트 설계자 조직)',     cat: 'hobby', horizon: 'long',  proj: 'AI팀',          status: 'todo' },
  { id: 't27', title: 'Korean Law MCP 에이전트 구축',         cat: 'hobby', horizon: 'long',  proj: 'Jarvis',       status: 'todo' },
];

const STATUS_ORDER = ['todo', 'doing', 'done'];
const STATUS_LABEL = { todo: 'TODO', doing: 'DOING', done: 'DONE' };

let tasks = loadTasks();
let hideDone = localStorage.getItem('kanban-hide-done') === '1';
let showActions = localStorage.getItem('kanban-show-actions') === '1';

function loadTasks() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    try {
      const parsed = JSON.parse(stored);
      return parsed.map(t => ({ status: 'todo', ...t }));
    } catch(e) {}
  }
  // migrate from v1
  const v1 = localStorage.getItem('jarvis-kanban-v1');
  if (v1) {
    try {
      const parsed = JSON.parse(v1).map(t => ({ status: 'todo', ...t }));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
      return parsed;
    } catch(e) {}
  }
  return JSON.parse(JSON.stringify(DEFAULT_TASKS));
}

function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  const el = document.getElementById('status');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1000);
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function horizonBadge(h) {
  if (h === 'short') return '<span class="badge short">단기</span>';
  if (h === 'mid')   return '<span class="badge mid">중기</span>';
  if (h === 'long')  return '<span class="badge long">장기</span>';
  return '';
}
function projBadge(p) { return p ? `<span class="badge proj">${escapeHtml(p)}</span>` : ''; }

function render() {
  document.body.classList.toggle('hide-done', hideDone);
  document.getElementById('filter-done-btn').classList.toggle('active', hideDone);

  const cats = ['inbox', 'work', 'home', 'hobby'];
  cats.forEach(cat => {
    const list = document.getElementById('list-' + cat);
    const items = tasks.filter(t => t.cat === cat);
    const visibleCount = hideDone ? items.filter(t => t.status !== 'done').length : items.length;
    document.getElementById('count-' + cat).textContent = visibleCount;
    if (items.length === 0) {
      list.innerHTML = '<div class="empty">비어있음</div>';
    } else {
      list.innerHTML = items.map(t => `
        <div class="task" data-id="${t.id}" data-status="${t.status || 'todo'}">
          <div class="task-header">
            <div class="task-title">${escapeHtml(t.title)}</div>
            <button class="status-btn" data-state="${t.status || 'todo'}" onclick="cycleStatus('${t.id}', event)">${STATUS_LABEL[t.status || 'todo']}</button>
          </div>
          <div class="task-meta">${horizonBadge(t.horizon)}${projBadge(t.proj)}</div>
          ${showActions ? `
          <div class="task-actions">
            <button class="task-action" onclick="editTask('${t.id}', event)">✏️ 수정</button>
            <button class="task-action" onclick="cycleHorizon('${t.id}', event)">📅 ${t.horizon || '—'}</button>
            <button class="task-action delete" onclick="deleteTask('${t.id}', event)">🗑️ 삭제</button>
          </div>` : ''}
        </div>
      `).join('');
    }
  });
  initSortable();
}

function initSortable() {
  const cats = ['inbox', 'work', 'home', 'hobby'];
  cats.forEach(cat => {
    const el = document.getElementById('list-' + cat);
    new Sortable(el, {
      group: 'kanban',
      animation: 150,
      delay: 150, // mobile long-press to drag
      delayOnTouchOnly: true,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      onEnd: evt => {
        const id = evt.item.dataset.id;
        const newCat = evt.to.id.replace('list-', '');
        const task = tasks.find(t => t.id === id);
        if (task) task.cat = newCat;
        const newOrder = Array.from(evt.to.children)
          .filter(c => c.classList.contains('task'))
          .map(c => c.dataset.id);
        const others = tasks.filter(t => t.cat !== newCat);
        const inCat = newOrder.map(id => tasks.find(t => t.id === id)).filter(Boolean);
        tasks = [...others, ...inCat];
        saveTasks();
        render();
      }
    });
  });
}

function cycleStatus(id, evt) {
  if (evt) evt.stopPropagation();
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const cur = task.status || 'todo';
  const next = STATUS_ORDER[(STATUS_ORDER.indexOf(cur) + 1) % STATUS_ORDER.length];
  task.status = next;
  saveTasks();
  render();
}

function cycleHorizon(id, evt) {
  if (evt) evt.stopPropagation();
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const ORDER = ['short', 'mid', 'long'];
  const cur = task.horizon || 'short';
  task.horizon = ORDER[(ORDER.indexOf(cur) + 1) % ORDER.length];
  saveTasks();
  render();
}

function editTask(id, evt) {
  if (evt) evt.stopPropagation();
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const newTitle = prompt('제목 수정:', task.title);
  if (newTitle && newTitle.trim()) {
    task.title = newTitle.trim();
    saveTasks();
    render();
  }
}

function deleteTask(id, evt) {
  if (evt) evt.stopPropagation();
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  if (!confirm(`"${task.title}" 삭제하시겠습니까?`)) return;
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  render();
}

function addTask(cat) {
  const title = prompt('새 할 일 제목:');
  if (!title || !title.trim()) return;
  const id = 't' + Date.now();
  tasks.push({ id, title: title.trim(), cat, horizon: 'short', proj: '', status: 'todo' });
  saveTasks();
  render();
}

function toggleHideDone() {
  hideDone = !hideDone;
  localStorage.setItem('kanban-hide-done', hideDone ? '1' : '0');
  render();
}

function cycleExpand() {
  showActions = !showActions;
  localStorage.setItem('kanban-show-actions', showActions ? '1' : '0');
  render();
}

function showHelp() {
  alert([
    '📘 자비스 칸반 사용법',
    '',
    '▶ 상태 변경:',
    '  카드 우측 상단 TODO/DOING/DONE 배지를 탭하면 순환',
    '  TODO → DOING → DONE → TODO',
    '',
    '▶ 카테고리 이동:',
    '  카드를 길게 누른 채로 드래그해서 컬럼 간 이동',
    '',
    '▶ 액션 버튼:',
    '  툴바의 "🔧 액션 버튼" 탭하면 각 카드에',
    '  수정/기간변경/삭제 버튼이 나타남',
    '',
    '▶ 완료 숨김:',
    '  "✅ 완료 숨김" 토글로 DONE 상태 카드 숨기기',
    '',
    '▶ 저장:',
    '  모든 변경은 브라우저 자동 저장 (localStorage)',
    '  📦 내보내기로 JSON 백업 가능',
  ].join('\n'));
}

function saveAll() { saveTasks(); }

function exportJSON() {
  const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const date = new Date().toISOString().slice(0,10);
  a.download = `jarvis-kanban-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data)) {
          tasks = data.map(t => ({ status: 'todo', ...t }));
          saveTasks();
          render();
        }
      } catch (err) { alert('JSON 파싱 실패'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetDefault() {
  if (!confirm('기본값으로 초기화하시겠습니까? 현재 변경사항이 사라집니다.')) return;
  tasks = JSON.parse(JSON.stringify(DEFAULT_TASKS));
  saveTasks();
  render();
}

render();
</script>
</body>
</html>
